name: Playwright Regression

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  regression-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Export local Supabase env
        run: |
          supabase status -o env >> "$GITHUB_ENV"
          echo "SUPABASE_DB_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres" >> "$GITHUB_ENV"
          echo "VITE_AUTH_REDIRECT_URL=http://127.0.0.1:4173/" >> "$GITHUB_ENV"
          echo "E2E_BASE_URL=http://127.0.0.1:4173" >> "$GITHUB_ENV"

      - name: Bootstrap schema, migrations, seed, and auth users
        run: npm run e2e:bootstrap:local

      - name: Build app against local Supabase
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          VITE_AUTH_REDIRECT_URL: ${{ env.VITE_AUTH_REDIRECT_URL }}

      - name: Start preview server
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat preview.log
          exit 1
        env:
          VITE_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          VITE_AUTH_REDIRECT_URL: ${{ env.VITE_AUTH_REDIRECT_URL }}

      - name: Run Playwright regression tests
        run: npm run qa:e2e
        env:
          CI: true
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
