name: Deploy To Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SESSION_TIMEOUT_MINUTES: ${{ secrets.VITE_SESSION_TIMEOUT_MINUTES }}
      VITE_MONITOR_WEBHOOK_URL: ${{ secrets.VITE_MONITOR_WEBHOOK_URL }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      VITE_AUTH_REDIRECT_URL: ${{ secrets.VITE_AUTH_REDIRECT_URL }}
      SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
      SITE_HEALTHCHECK_URL: ${{ secrets.SITE_HEALTHCHECK_URL }}
      DEPLOY_NOTIFY_WEBHOOK_URL: ${{ secrets.DEPLOY_NOTIFY_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Dist To Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          local-dir: dist/
          server-dir: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}
          dangerous-clean-slate: false

      - name: Health Check
        shell: bash
        run: |
          URL="${SITE_HEALTHCHECK_URL:-${SITE_BASE_URL%/}/healthz.json}"
          echo "Checking ${URL}"
          curl --fail --silent --show-error --location "$URL" > /tmp/healthz.json
          cat /tmp/healthz.json

      - name: Notify Deploy Webhook
        if: ${{ success() && env.DEPLOY_NOTIFY_WEBHOOK_URL != '' }}
        shell: bash
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"success\",\"repo\":\"${GITHUB_REPOSITORY}\",\"branch\":\"${GITHUB_REF_NAME}\",\"commit\":\"${GITHUB_SHA}\",\"url\":\"${SITE_BASE_URL}\"}" \
            "$DEPLOY_NOTIFY_WEBHOOK_URL"

      - name: Notify Failure Webhook
        if: ${{ failure() && env.DEPLOY_NOTIFY_WEBHOOK_URL != '' }}
        shell: bash
        run: |
          curl --silent --show-error \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"failure\",\"repo\":\"${GITHUB_REPOSITORY}\",\"branch\":\"${GITHUB_REF_NAME}\",\"commit\":\"${GITHUB_SHA}\",\"url\":\"${SITE_BASE_URL}\"}" \
            "$DEPLOY_NOTIFY_WEBHOOK_URL"
