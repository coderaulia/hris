<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Performance Suite - Vanaila HRIS</title>
    <meta name="description" content="HR employee performance assessment and KPI tracking platform.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="bg-light">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://browser.sentry-cdn.com/8.42.0/bundle.tracing.min.js" crossorigin="anonymous"></script>

    <div id="component-login"></div>

    <div class="hidden" id="main-app">
        <div class="app-shell">
            <aside class="app-sidebar" id="app-sidebar">
                <div id="component-header"></div>
            </aside>

            <main class="app-main">
                <div class="app-main-inner">
                    <div class="topbar-card">
                        <div class="topbar-head">
                            <div>
                                <div class="topbar-kicker">Workspace Navigation</div>
                                <h2 class="topbar-title" id="content-title">Dashboard</h2>
                                <p class="topbar-copy mb-0" id="content-description">Track company performance, workforce activity, and HR operations in one place.</p>
                            </div>
                            <button class="sidebar-mobile-toggle main-menu-toggle" type="button" onclick="window.__app.toggleSidebarMobile()">
                                <i class="bi bi-list"></i>
                                <span>Menu</span>
                            </button>
                        </div>
                    </div>

                    <div class="card shadow-sm border-0 mb-4 report-filter-card" id="report-filters-card">
                        <div class="card-body py-3">
                            <div class="d-flex align-items-center gap-2 flex-wrap">
                                <span class="small fw-bold text-muted text-uppercase me-1"><i class="bi bi-funnel me-1"></i>Report Filters</span>
                                <select id="report-filter-department" class="form-select form-select-sm" style="max-width: 240px;"
                                    onchange="window.__app.updateReportFilters()">
                                    <option value="">All Departments</option>
                                </select>
                                <select id="report-filter-manager" class="form-select form-select-sm" style="max-width: 240px;"
                                    onchange="window.__app.updateReportFilters()">
                                    <option value="">All Managers</option>
                                </select>
                                <input type="month" id="report-filter-period" class="form-control form-control-sm" style="max-width: 180px;"
                                    onchange="window.__app.updateReportFilters()">
                                <button class="btn btn-outline-secondary btn-sm" onclick="window.__app.clearReportFilters()">
                                    <i class="bi bi-x-circle me-1"></i>Clear
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="component-dashboard"></div>
                    <div id="component-employees"></div>
                    <div id="component-assessment"></div>
                    <div id="component-records"></div>
                    <div id="component-documents"></div>
                    <div id="component-settings"></div>

                    <div class="text-center text-muted small mt-4 pb-4">
                        Copyright &copy; 2026 - Powered by <a href="https://vanaila.com" target="_blank">Vanaila.com</a> & Supabase
                        &middot; <a href="/manual.html" target="_blank" rel="noopener noreferrer">User Manual</a>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="component-overlays"></div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
